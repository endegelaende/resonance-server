# Publish resonance-server to PyPI using Trusted Publishers (OIDC).
#
# Trigger: push a tag like  v0.1.0, v1.2.3, etc.
#
# Prerequisites (one-time setup on https://pypi.org/manage/account/publishing/):
#   1. "Add a new pending publisher"
#   2. PyPI project name:  resonance-server
#   3. Owner:              endegelaende
#   4. Repository:         resonance-server
#   5. Workflow name:      publish-pypi.yml
#   6. Environment:        pypi

name: Publish to PyPI

on:
    push:
        tags:
            - "v*"

# Only one publish job at a time per tag.
concurrency:
    group: publish-${{ github.ref }}
    cancel-in-progress: false

jobs:
    # ── 1) Build web-ui + Python distributions ─────────────────────────
    build:
        name: Build sdist & wheel
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            # ── Node.js: build the Svelte web-ui ──
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: web-ui/package-lock.json

            - name: Install web-ui dependencies
              working-directory: web-ui
              run: npm ci

            - name: Build web-ui
              working-directory: web-ui
              run: npm run build

            - name: Verify web-ui build output
              run: |
                  if [ ! -f web-ui/build/index.html ]; then
                    echo "::error::web-ui/build/index.html not found — Svelte build failed"
                    exit 1
                  fi
                  echo "Web-UI build OK ($(find web-ui/build -type f | wc -l) files)"

            # ── Python: build sdist + wheel ──
            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install build tools
              run: pip install --upgrade pip build

            - name: Validate version matches tag
              run: |
                  TAG="${GITHUB_REF#refs/tags/v}"
                  PKG_VERSION=$(python -c "
                  import tomllib, pathlib
                  data = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
                  print(data['project']['version'])
                  ")
                  if [ "$TAG" != "$PKG_VERSION" ]; then
                    echo "::error::Tag v$TAG does not match pyproject.toml version $PKG_VERSION"
                    exit 1
                  fi
                  echo "Version OK: $PKG_VERSION"

            - name: Build sdist and wheel
              run: python -m build

            - name: List dist contents
              run: ls -lh dist/

            - name: Upload dist artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: dist
                  path: dist/
                  if-no-files-found: error

    # ── 2) Publish to PyPI ─────────────────────────────────────────────
    publish:
        name: Publish to PyPI
        needs: build
        runs-on: ubuntu-latest
        environment: pypi
        permissions:
            id-token: write # Required for Trusted Publishers (OIDC)

        steps:
            - name: Download dist artifacts
              uses: actions/download-artifact@v4
              with:
                  name: dist
                  path: dist/

            - name: Publish to PyPI
              uses: pypa/gh-action-pypi-publish@release/v1
