[plugin]
name = "radio"
version = "3.0.0"
description = "Internet Radio — browse, search, and stream live radio via radio-browser.info. ~40,000+ stations, browse by country/genre/language, recently played stations, play from SDUI, SDUI dashboard, and full Jive menu integration."
author = "Resonance"
min_resonance_version = "0.1.0"
category = "radio"

[ui]
enabled = true
sidebar_label = "Radio"
sidebar_icon = "radio"

# ---------------------------------------------------------------------------
# Settings
# ---------------------------------------------------------------------------

[settings.default_country]
type = "string"
label = "Default Country"
description = "ISO 3166-1 alpha-2 country code (e.g. DE, US, GB, FR) used to highlight your country in radio-browser listings. Leave empty for no default."
default = ""
order = 10

[settings.cache_ttl]
type = "int"
label = "Browse Cache (seconds)"
description = "How long browse results (categories, country lists, station lists) are cached in memory before re-fetching. Lower values mean fresher data but more API requests."
default = 600
min = 60
max = 7200
order = 20

[settings.max_recent_stations]
type = "int"
label = "Max Recently Played"
description = "Maximum number of recently played stations to remember. These are shown in the 'Recent' tab of the Radio page."
default = 50
min = 5
max = 200
order = 30

[settings.show_station_metadata]
type = "bool"
label = "Show Station Metadata"
description = "Display codec, bitrate, country, and genre tags in station listings. Disable for a cleaner look."
default = true
order = 40
