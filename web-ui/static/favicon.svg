<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0c27a"/>
      <stop offset="100%" stop-color="#e09f5a"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#f8fafc"/>
  <circle cx="16" cy="16" r="15" fill="none" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Concentric sound waves -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="url(#g)" stroke-width="1.2" opacity="0.3"/>
  <circle cx="16" cy="16" r="9" fill="none" stroke="url(#g)" stroke-width="1.4" opacity="0.5"/>
  <circle cx="16" cy="16" r="6" fill="none" stroke="url(#g)" stroke-width="1.6" opacity="0.7"/>

  <!-- Center dot -->
  <circle cx="16" cy="16" r="2.5" fill="url(#g)"/>
</svg>
